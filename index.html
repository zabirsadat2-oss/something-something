<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Tulip Garden</title>
    <style>
        :root {
            --bg-color: #000000;
            --btn-bg: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevents scrolling on mobile */
            touch-action: none; /* Prevents pull-to-refresh while tapping */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            display: block;
        }

        .overlay {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .top-left {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .center-ui {
            text-align: center;
            width: 100%;
        }

        /* Responsive typography */
        .center-ui p {
            margin: 0;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            opacity: 0.7;
        }

        .center-ui h1 {
            /* clamp(min, preferred, max) ensures it fits mobile and desktop */
            font-size: clamp(2.2rem, 10vw, 3.5rem);
            margin: 10px 0;
            font-weight: 800;
            background: linear-gradient(to right, #f8a5c2, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: var(--btn-bg);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.2s;
            font-size: 0.9rem;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.95);
        }

        .footer-note {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 20px);
            font-size: 0.7rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <canvas id="gardenCanvas"></canvas>

    <div class="top-left">Flower Garden for You</div>

    <div class="overlay">
        <div class="center-ui">
            <p>Tap anywhere to</p>
            <h1>Plant Tulips</h1>
            <p>🌷 or use Auto Bloom</p>
            
            <div class="controls">
                <button onclick="clearGarden()">Clear</button>
                <button id="autoBtn" onclick="toggleAutoBloom()">Auto Bloom</button>
            </div>
        </div>
        <div class="footer-note">Tap screen to grow</div>
    </div>

    <script>
        const canvas = document.getElementById('gardenCanvas');
        const ctx = canvas.getContext('2d');
        const autoBtn = document.getElementById('autoBtn');

        let tulips = [];
        let autoBloomActive = false;
        let autoInterval;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Tulip {
            constructor(x, y) {
                this.x = x;
                this.y_soil = y;
                this.stem_h = 0;
                // Scale height based on screen size (shorter on mobile)
                const heightFactor = window.innerHeight < 600 ? 100 : 200;
                this.max_stem_h = Math.random() * heightFactor + 50;
                this.flower_size = 0;
                this.max_flower_size = Math.random() * 10 + 15;
                this.hue = Math.random() * 360;
                this.growthSpeed = Math.random() * 2 + 1;
                this.state = 'stem';
            }

            draw() {
                if (this.state === 'stem') {
                    if (this.stem_h < this.max_stem_h) this.stem_h += this.growthSpeed;
                    else this.state = 'flower';
                } else if (this.state === 'flower') {
                    if (this.flower_size < this.max_flower_size) this.flower_size += 0.5;
                }

                ctx.save();
                ctx.translate(this.x, this.y_soil);

                // Draw Stem
                ctx.strokeStyle = '#417d41';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -this.stem_h);
                ctx.stroke();

                // Draw small leaves
                if (this.stem_h > 30) {
                    ctx.fillStyle = '#417d41';
                    ctx.beginPath();
                    ctx.ellipse(-4, -20, 5, 15, Math.PI/4, 0, Math.PI*2);
                    ctx.fill();
                }

                // Draw Tulip Head
                if (this.state !== 'stem' || this.stem_h >= this.max_stem_h) {
                    const headY = -this.stem_h;
                    ctx.translate(0, headY);
                    
                    ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                    // Left petal
                    this.drawPetal(-this.flower_size/2, 0, this.flower_size, -Math.PI/10);
                    // Right petal
                    this.drawPetal(this.flower_size/2, 0, this.flower_size, Math.PI/10);
                    // Center petal
                    ctx.fillStyle = `hsl(${this.hue}, 80%, 70%)`;
                    this.drawPetal(0, 0, this.flower_size * 1.1, 0);
                }
                ctx.restore();
            }

            drawPetal(x, y, size, rotation) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size, -size, size, -size, 0, 0);
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            tulips.forEach(t => t.draw());
            requestAnimationFrame(animate);
        }

        // Handle both Mouse and Touch
        function handlePlant(e) {
            // Prevent button clicks from planting a flower behind them
            if (e.target.tagName === 'BUTTON') return;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            tulips.push(new Tulip(clientX, clientY));
        }

        window.addEventListener('mousedown', handlePlant);
        window.addEventListener('touchstart', handlePlant);

        function clearGarden() {
            tulips = [];
        }

        function toggleAutoBloom() {
            autoBloomActive = !autoBloomActive;
            if (autoBloomActive) {
                autoBtn.innerText = "Stop Bloom";
                autoBtn.style.background = "rgba(255, 255, 255, 0.4)";
                autoInterval = setInterval(() => {
                    const rx = Math.random() * canvas.width;
                    const ry = Math.random() * (canvas.height * 0.7) + (canvas.height * 0.3);
                    tulips.push(new Tulip(rx, ry));
                }, 400);
            } else {
                autoBtn.innerText = "Auto Bloom";
                autoBtn.style.background = "var(--btn-bg)";
                clearInterval(autoInterval);
            }
        }

        animate();
    </script>
</body>
</html>
