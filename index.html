<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lily Garden</title>
    <style>
        :root {
            --bg-color: #000000;
            --btn-bg: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .overlay {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            text-align: center;
            padding: 0 20px;
        }

        .top-left {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .center-ui p {
            margin: 0;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            opacity: 0.7;
        }

        .center-ui h1 {
            font-size: clamp(2.5rem, 12vw, 4rem);
            margin: 10px 0;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 10px rgba(238, 156, 167, 0.3));
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }

        button {
            background: var(--btn-bg);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.2);
        }

        .footer-note {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 20px);
            font-size: 0.7rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <canvas id="gardenCanvas"></canvas>

    <div class="top-left">Lily Garden for You</div>

    <div class="overlay">
        <div class="center-ui">
            <p>Tap to plant a</p>
            <h1>Wild Lily</h1>
            <p>✨ or auto-generate your garden</p>
            
            <div class="controls">
                <button onclick="clearGarden()">Clear</button>
                <button id="autoBtn" onclick="toggleAutoBloom()">Auto Bloom</button>
            </div>
        </div>
        <div class="footer-note">Optimized for Mobile Taps</div>
    </div>

    <script>
        const canvas = document.getElementById('gardenCanvas');
        const ctx = canvas.getContext('2d');
        const autoBtn = document.getElementById('autoBtn');

        let flowers = [];
        let autoBloomActive = false;
        let autoInterval;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Lily {
            constructor(x, y) {
                this.x = x;
                this.y_soil = y;
                this.stem_h = 0;
                const hLimit = window.innerHeight < 600 ? 120 : 250;
                this.max_stem_h = Math.random() * hLimit + 80;
                this.flower_size = 0;
                this.max_flower_size = Math.random() * 15 + 25;
                this.hue = Math.random() * 360; // Any color lily
                this.growthSpeed = Math.random() * 3 + 2;
                this.state = 'stem';
            }

            draw() {
                if (this.state === 'stem') {
                    if (this.stem_h < this.max_stem_h) this.stem_h += this.growthSpeed;
                    else this.state = 'flower';
                } else if (this.state === 'flower') {
                    if (this.flower_size < this.max_flower_size) this.flower_size += 0.8;
                }

                ctx.save();
                ctx.translate(this.x, this.y_soil);

                // --- Draw Stem ---
                ctx.strokeStyle = '#2d5a27';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                // Slight curve to the stem for realism
                ctx.quadraticCurveTo(10, -this.stem_h/2, 0, -this.stem_h);
                ctx.stroke();

                // --- Draw Long Lily Leaves ---
                if (this.stem_h > 40) {
                    this.drawLeaf(-5, -this.stem_h * 0.3, -0.5);
                    this.drawLeaf(5, -this.stem_h * 0.5, 0.5);
                }

                // --- Draw Lily Head ---
                if (this.state === 'flower' || this.stem_h >= this.max_stem_h) {
                    ctx.translate(0, -this.stem_h);
                    
                    const size = this.flower_size;
                    
                    // Draw 6 petals (Lilies have 6 tepals)
                    for (let i = 0; i < 6; i++) {
                        ctx.save();
                        ctx.rotate((i * 60) * Math.PI / 180);
                        this.drawPetal(size);
                        ctx.restore();
                    }

                    // --- Draw Stamens (the "whiskers") ---
                    if (size > 10) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1;
                        for (let i = 0; i < 5; i++) {
                            ctx.save();
                            ctx.rotate((i * 72) * Math.PI / 180);
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.lineTo(0, -size * 0.6);
                            ctx.stroke();
                            // Pollen tip
                            ctx.fillStyle = '#4a2c2a';
                            ctx.fillRect(-2, -size * 0.65, 4, 2);
                            ctx.restore();
                        }
                    }
                }
                ctx.restore();
            }

            drawPetal(s) {
                // A lily petal is long, tapered, and slightly wider in the middle
                ctx.beginPath();
                ctx.fillStyle = `hsl(${this.hue}, 80%, 70%)`;
                ctx.moveTo(0, 0);
                // Left curve
                ctx.bezierCurveTo(-s/2, -s/2, -s/4, -s, 0, -s);
                // Right curve
                ctx.bezierCurveTo(s/4, -s, s/2, -s/2, 0, 0);
                ctx.fill();
                
                // Central vein detail
                ctx.strokeStyle = `hsl(${this.hue}, 80%, 50%)`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -s * 0.8);
                ctx.stroke();
            }

            drawLeaf(x, y, rot) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rot);
                ctx.fillStyle = '#3a7233';
                ctx.beginPath();
                ctx.ellipse(0, 0, 4, 25, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flowers.forEach(f => f.draw());
            requestAnimationFrame(animate);
        }

        function handleInteraction(e) {
            if (e.target.tagName === 'BUTTON') return;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            flowers.push(new Lily(x, y));
        }

        window.addEventListener('mousedown', handleInteraction);
        window.addEventListener('touchstart', handleInteraction);

        function clearGarden() {
            flowers = [];
        }

        function toggleAutoBloom() {
            autoBloomActive = !autoBloomActive;
            if (autoBloomActive) {
                autoBtn.innerText = "Stop";
                autoInterval = setInterval(() => {
                    const rx = Math.random() * canvas.width;
                    const ry = Math.random() * (canvas.height * 0.7) + (canvas.height * 0.2);
                    flowers.push(new Lily(rx, ry));
                }, 500);
            } else {
                autoBtn.innerText = "Auto Bloom";
                clearInterval(autoInterval);
            }
        }

        animate();
    </script>
</body>
</html>
